name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-latest/windows-latest are x86_64 (AVX2 always available;
        # AVX-512F depends on the specific runner generation Actions assigns
        # — is_x86_feature_detected! handles either case gracefully, this
        # matrix just can't guarantee AVX-512F gets exercised every run).
        # macos-latest is Apple Silicon (aarch64/NEON) as of macos-14.
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: cargo test
        run: cargo test --release
      - name: cargo run --example basic (smoke test)
        run: cargo run --release --example basic

  cross-check-x86_64:
    name: cross-check (x86_64-apple-darwin, from macOS aarch64 host)
    # Covers the AVX-512/AVX2 source paths even when the host running this
    # particular job is Apple Silicon — type-check + clippy only, since
    # cross-compiled x86_64 binaries can't execute on an aarch64 host without
    # Rosetta. The `test` job's ubuntu-latest/windows-latest legs are what
    # actually *execute* the x86_64 kernels.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --target x86_64-apple-darwin --all-targets --all-features -- -D warnings

  wasm:
    name: wasm32 (real execution via Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: cargo clippy --target wasm32-unknown-unknown
        run: cargo clippy --target wasm32-unknown-unknown --lib -- -D warnings
      - name: wasm-pack test --node
        run: wasm-pack test --node

  msrv:
    name: MSRV (1.89.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
      - uses: Swatinem/rust-cache@v2
      # `--lib` only: dev-dependencies (criterion -> clap, in particular)
      # drift their own MSRV independently of this crate's code and aren't
      # part of what a downstream consumer of the published library needs.
      - run: cargo check --lib

  deny:
    name: cargo-deny (licenses, advisories, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  fuzz-smoke:
    name: fuzz targets build + short smoke run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - run: cargo install cargo-fuzz --locked
      - name: build + run each fuzz target briefly
        run: |
          for target in $(cargo fuzz list); do
            cargo fuzz run "$target" -- -max_total_time=30
          done

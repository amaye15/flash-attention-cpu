name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-latest/windows-latest are x86_64 (AVX2 always available;
        # AVX-512F depends on the specific runner generation Actions assigns
        # — is_x86_feature_detected! handles either case gracefully, this
        # matrix just can't guarantee AVX-512F gets exercised every run).
        # macos-latest is Apple Silicon (aarch64/NEON) as of macos-14.
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: cargo doc (catches broken intra-doc links / missing docs before docs.rs does)
        run: cargo doc --no-deps --lib
        env:
          RUSTDOCFLAGS: -D warnings
      - name: cargo test
        run: cargo test --release
      - name: cargo run --example basic (smoke test)
        run: cargo run --release --example basic
      - name: cpu flags (diagnostic for interpreting the benchmark below)
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            grep -m1 flags /proc/cpuinfo | tr ' ' '\n' | grep -E '^(avx2|avx512f|fma)$' || true
          elif [ "$RUNNER_OS" = "macOS" ]; then
            sysctl -a 2>/dev/null | grep -i 'hw.optional.neon' || true
          else
            echo "CPU flags not queried on $RUNNER_OS"
          fi
      - name: cargo run --example bench_quick (real-hardware timing, informational only — shared CI runners are noisy, not for regression gating)
        run: cargo run --release --example bench_quick
      - name: cargo run --example bench_quick --csv (persistent history — see the bench-history job)
        shell: bash
        run: |
          short_sha="${GITHUB_SHA:0:8}"
          BENCH_COMMIT="$short_sha" cargo run --release --example bench_quick -- --csv > "bench-${{ matrix.os }}.csv"
      - name: upload bench CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-csv-${{ matrix.os }}
          path: bench-${{ matrix.os }}.csv

  bench-history:
    name: append benchmark history
    needs: test
    # Only on a real push to main — not PRs (no write access needed/wanted
    # there) and not workflow_dispatch reruns of an old ref. `needs: test`
    # already means this is skipped if any matrix leg failed, which is the
    # right call: don't record perf data for a broken build.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: actions/download-artifact@v4
        with:
          pattern: bench-csv-*
          path: bench-csv
          merge-multiple: true
      - name: append, commit, and push (idempotent — skips if this commit is already recorded, e.g. on a job re-run)
        shell: bash
        run: |
          short_sha="${GITHUB_SHA:0:8}"
          if grep -q ",$short_sha," benches/history.csv 2>/dev/null; then
            echo "commit $short_sha already recorded in benches/history.csv, skipping"
            exit 0
          fi
          for f in bench-csv/*.csv; do
            tail -n +2 "$f" >> benches/history.csv
          done
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benches/history.csv
          git commit -m "chore: append CI benchmark history for ${short_sha} [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin main

  cross-check-x86_64:
    name: cross-check (x86_64-apple-darwin, from macOS aarch64 host)
    # Covers the AVX-512/AVX2 source paths even when the host running this
    # particular job is Apple Silicon — type-check + clippy only, since
    # cross-compiled x86_64 binaries can't execute on an aarch64 host without
    # Rosetta. The `test` job's ubuntu-latest/windows-latest legs are what
    # actually *execute* the x86_64 kernels.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --target x86_64-apple-darwin --all-targets --all-features -- -D warnings

  wasm:
    name: wasm32 (real execution via Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: cargo clippy --target wasm32-unknown-unknown
        run: cargo clippy --target wasm32-unknown-unknown --lib -- -D warnings
      - name: wasm-pack test --node
        run: wasm-pack test --node

  msrv:
    name: MSRV (1.89.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.89.0
      - uses: Swatinem/rust-cache@v2
      # `--lib` only: dev-dependencies (criterion -> clap, in particular)
      # drift their own MSRV independently of this crate's code and aren't
      # part of what a downstream consumer of the published library needs.
      - run: cargo check --lib

  deny:
    name: cargo-deny (licenses, advisories, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2

  fuzz-smoke:
    name: fuzz targets build + short smoke run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - run: cargo install cargo-fuzz --locked
      - name: build + run each fuzz target briefly
        # `+nightly` is required here even though the `nightly` toolchain
        # was just installed above: this repo's `rust-toolchain.toml` pins
        # `stable` for every plain `cargo` invocation (that override wins
        # over `rustup default`), and cargo-fuzz needs nightly's `-Z`
        # sanitizer flags.
        run: |
          for target in $(cargo +nightly fuzz list); do
            cargo +nightly fuzz run "$target" -- -max_total_time=30
          done

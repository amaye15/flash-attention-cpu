# cargo-deny configuration. Run locally with `cargo deny check` (after
# `cargo install cargo-deny`); CI runs it via EmbarkStudios/cargo-deny-action.
# Full reference: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
ignore = []

[licenses]
# Every license actually present in this crate's dependency tree (runtime +
# dev-dependencies, across all targets, since `all-features` above doesn't
# vary anything here but the wasm32-only dev-deps do add a few more crates'
# worth of licenses than the native-only tree has).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
# Multiple versions of the same crate in the tree is noise, not a real
# problem, for a dependency graph this small — warn, don't fail CI on it.
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
